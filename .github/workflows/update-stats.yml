name: Update GitHub Stats Cards

on:
  schedule:
    - cron: '0 */8 * * *' # Runs exactly 3 times a day
  workflow_dispatch: # Allows manual trigger via the Actions tab

jobs:
  refresh-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Local Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          # Pass your design configurations as query string strings directly into the engine
          options: 'username=logusivam&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true&bg_color=1a1b27'
          path: ./github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }} # Uses your profile's internal authentication token

      - name: Generate Local Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=logusivam&layout=compact&langs_count=8&theme=tokyonight&hide_border=true&bg_color=1a1b27'
          path: ./top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push changes
        env:
          MY_EMAIL: ${{ secrets.USER_EMAIL }}
          MY_NAME: ${{ secrets.USER_NAME }}
        run: |
          git config --local user.email "$MY_EMAIL"
          git config --local user.name "$MY_NAME"
          
          git add github-stats.svg top-langs.svg
          
          # Safely commit only if the underlying numbers changed
          git diff-index --quiet HEAD || git commit -m "chore: local generation of profile cards"
          git push
