name: Update GitHub Profile Cards

on:
  schedule:
    - cron: '0 */8 * * *' # Runs exactly 3 times a day
  workflow_dispatch: # Allows manual trigger via the Actions tab

jobs:
  refresh-profile-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 📊 CARD 1: Core Profile Metrics
      - name: Generate Local Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: 'username=logusivam&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true&bg_color=1a1b27'
          path: ./github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔠 CARD 2: Language Distribution 
      - name: Generate Local Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=logusivam&layout=compact&langs_count=8&theme=tokyonight&hide_border=true&bg_color=1a1b27'
          path: ./top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 CARD 3: GitHub Contribution Streak Stats
      - name: Generate Local Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: 'user=logusivam&theme=tokyonight&hide_border=true&background=1a1b27'
          path: ./github-streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 📈 NATIVE STEP 4: Independent Activity Graph Generation (Python Custom Script)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.x'

      - name: Generate Custom Activity Data SVG
        env:
          G_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, datetime
          
          # 1. Fetch real contributions via GitHub GraphQL API
          headers = {"Authorization": f"Bearer {os.environ['G_TOKEN']}"}
          query = """
          query($username: String!) {
            user(login: $username) {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays { contributionCount date color }
                  }
                }
              }
            }
          }
          """
          response = requests.post("https://api.github.com/graphql", json={"query": query, "variables": {"username": "logusivam"}}, headers=headers)
          data = response.json()['data']['user']['contributionsCollection']['contributionCalendar']
          
          # 2. Programmatically draw an SVG string
          svg_content = f'<svg xmlns="http://www.w3.org/2000/svg" width="400" height="120" viewBox="0 0 400 120">'
          svg_content += '<rect width="100%" height="100%" fill="#1a1b27" rx="10"/>'
          svg_content += f'<text x="20" y="30" fill="#7aa2f7" font-family="Arial" font-size="16" font-weight="bold">Activity Graph (Local Build)</text>'
          svg_content += f'<text x="20" y="55" fill="#a9b1d6" font-family="Arial" font-size="13">Total Year Contributions: {data["totalContributions"]}</text>'
          
          # Basic sparkline rendering using fetched values
          points = []
          days = [day for week in data['weeks'] for day in week['contributionDays']][-30:] # Last 30 days
          for idx, day in enumerate(days):
              x = 20 + (idx * 11)
              y = 95 - (min(day['contributionCount'], 10) * 3) # capped scaler
              points.append(f"{x},{y}")
              
          svg_content += f'<polyline fill="none" stroke="#79bbff" stroke-width="3" points="{" ".join(points)}"/>'
          svg_content += '</svg>'
          
          with open("./activity-graph.svg", "w") as f:
              f.write(svg_content)

      # 🚀 STEP 5: Consolidate, Commit and Push
      - name: Commit and Push changes
        env:
          MY_EMAIL: ${{ secrets.USER_EMAIL }}
          MY_NAME: ${{ secrets.USER_NAME }}
        run: |
          git config --local user.email "$MY_EMAIL"
          git config --local user.name "$MY_NAME"
          
          git add github-stats.svg top-langs.svg github-streak.svg activity-graph.svg
          git diff-index --quiet HEAD || git commit -m "chore: compile clean production assets natively"
          git push
