name: Update GitHub Profile Cards

on:
  schedule:
    - cron: '0 */8 * * *' # Runs exactly 3 times a day
  workflow_dispatch: # Allows manual trigger via the Actions tab

jobs:
  refresh-profile-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 📊 CARD 1: Core Profile Metrics
      - name: Generate Local Stats Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: 'username=logusivam&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true&bg_color=1a1b27'
          path: ./github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔠 CARD 2: Language Distribution 
      - name: Generate Local Top Languages Card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: 'username=logusivam&layout=compact&langs_count=8&theme=tokyonight&hide_border=true&bg_color=1a1b27'
          path: ./top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 🔥 CARD 3: GitHub Contribution Streak Stats
      - name: Generate Local Streak Stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: 'user=logusivam&theme=tokyonight&hide_border=true&background=1a1b27'
          path: ./github-streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # 📈 NATIVE STEP 4: Independent Professional Activity Graph Generation (Python)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Runtime Dependencies
        run: pip install requests

      - name: Generate Custom Activity Data SVG
        env:
          G_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: python
        run: |
          import os, requests, datetime

          # 1. Fetch real contributions via GitHub GraphQL API
          headers = {"Authorization": f"Bearer {os.environ['G_TOKEN']}"}
          query = """
          query($username: String!) {
            user(login: $username) {
              contributionsCollection {
                contributionCalendar {
                  totalContributions
                  weeks {
                    contributionDays { contributionCount date }
                  }
                }
              }
            }
          }
          """
          response = requests.post("https://api.github.com/graphql", json={"query": query, "variables": {"username": "logusivam"}}, headers=headers)
          data = response.json()['data']['user']['contributionsCollection']['contributionCalendar']

          # Process the last 31 days to fill the complete horizontal span beautifully
          all_days = [day for week in data['weeks'] for day in week['contributionDays']]
          days = all_days[-31:] if len(all_days) >= 31 else all_days

          # 2. Setup Dimensions to exactly match your target graphic aspect ratio
          width, height = 900, 320
          padding_left, padding_right = 70, 40
          padding_top, padding_bottom = 70, 60
          
          graph_width = width - padding_left - padding_right
          graph_height = height - padding_top - padding_bottom

          # Round max value up to nearest 5 or 10 to ensure neat horizontal grid division alignment
          raw_max = max([d['contributionCount'] for d in days] + [5])
          max_val = ((raw_max // 5) + 1) * 5 if raw_max % 5 != 0 else raw_max

          # Calculate coordinate point arrays
          points = []
          for idx, day in enumerate(days):
              x = padding_left + (idx * (graph_width / (len(days) - 1)))
              y = padding_top + graph_height - (day['contributionCount'] * (graph_height / max_val))
              points.append((x, y))

          # 3. Create Bezier Smoothing Curve Path Control points
          def get_smooth_path(pts):
              if not pts: return ""
              path_str = f"M {pts[0][0]:.1f},{pts[0][1]:.1f}"
              for i in range(len(pts) - 1):
                  p0, p1 = pts[i], pts[i+1]
                  cp1_x = p0[0] + (p1[0] - p0[0]) / 2
                  cp1_y = p0[1]
                  cp2_x = p0[0] + (p1[0] - p0[0]) / 2
                  cp2_y = p1[1]
                  path_str += f" C {cp1_x:.1f},{cp1_y:.1f} {cp2_x:.1f},{cp2_y:.1f} {p1[0]:.1f},{p1[1]:.1f}"
              return path_str

          line_path = get_smooth_path(points)
          area_path = f"{line_path} L {points[-1][0]:.1f},{padding_top + graph_height} L {points[0][0]:.1f},{padding_top + graph_height} Z"

          # 4. Generate SVG output strings with exact style tokens
          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{width}" height="{height}" viewBox="0 0 {width} {height}">
            <style>
              .title {{ font: bold 20px 'Segoe UI', Ubuntu, Sans-Serif; fill: #5486f7; text-anchor: middle; }}
              .axis-title {{ font: bold 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #6f93e3; }}
              .axis-label {{ font: 12px 'Segoe UI', Ubuntu, Sans-Serif; fill: #485c8a; }}
              .grid-line {{ stroke: #1f2335; stroke-width: 1; stroke-dasharray: 3,3; }}
              .data-dot {{ fill: #a9b1d6; stroke: #5486f7; stroke-width: 2; }}
            </style>
            
            <rect width="100%" height="100%" fill="#1a1b27" />
            
            <defs>
              <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#5486f7" stop-opacity="0.35"/>
                <stop offset="100%" stop-color="#5486f7" stop-opacity="0.0"/>
              </linearGradient>
            </defs>

            <text x="{width / 2}" y="40" class="title">Loganathan G P's Contribution Graph</text>

            <text x="25" y="{padding_top + graph_height/2}" class="axis-title" transform="rotate(-90, 25, {padding_top + graph_height/2})" text-anchor="middle">Contributions</text>
            <text x="{width / 2}" y="{height - 15}" class="axis-title" text-anchor="middle">Days</text>

            <line x1="{padding_left}" y1="{padding_top}" x2="{width - padding_right}" y2="{padding_top}" class="grid-line" />
            <line x1="{padding_left}" y1="{padding_top + graph_height*0.25}" x2="{width - padding_right}" y2="{padding_top + graph_height*0.25}" class="grid-line" />
            <line x1="{padding_left}" y1="{padding_top + graph_height*0.5}" x2="{width - padding_right}" y2="{padding_top + graph_height*0.5}" class="grid-line" />
            <line x1="{padding_left}" y1="{padding_top + graph_height*0.75}" x2="{width - padding_right}" y2="{padding_top + graph_height*0.75}" class="grid-line" />
            <line x1="{padding_left}" y1="{padding_top + graph_height}" x2="{width - padding_right}" y2="{padding_top + graph_height}" class="grid-line" />

            <text x="{padding_left - 15}" y="{padding_top + 4}" text-anchor="end" class="axis-label">{int(max_val)}</text>
            <text x="{padding_left - 15}" y="{padding_top + graph_height*0.25 + 4}" text-anchor="end" class="axis-label">{int(max_val*0.75)}</text>
            <text x="{padding_left - 15}" y="{padding_top + graph_height*0.5 + 4}" text-anchor="end" class="axis-label">{int(max_val*0.5)}</text>
            <text x="{padding_left - 15}" y="{padding_top + graph_height*0.75 + 4}" text-anchor="end" class="axis-label">{int(max_val*0.25)}</text>
            <text x="{padding_left - 15}" y="{padding_top + graph_height + 4}" text-anchor="end" class="axis-label">0</text>
          '''

          # Vertical Grid Lines + Comprehensive Day Labels along X Axis
          for idx, day in enumerate(days):
              x_pos = points[idx][0]
              day_num = datetime.datetime.strptime(day['date'], '%Y-%m-%d').strftime('%d').lstrip('0') or '0'
              # Vertical dashed indicator lines
              svg += f'<line x1="{x_pos}" y1="{padding_top}" x2="{x_pos}" y2="{padding_top + graph_height}" class="grid-line" />'
              # Label value mapping
              svg += f'<text x="{x_pos}" y="{padding_top + graph_height + 22}" text-anchor="middle" class="axis-label">{day_num}</text>'

          # Render Areas & Curves Shapes
          svg += f'''
            <path d="{area_path}" fill="url(#area-grad)" />
            <path d="{line_path}" fill="none" stroke="#5486f7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          '''

          # Overlay Junction Data Circles directly matching your screenshot dots layout
          for pt in points:
              svg += f'<circle cx="{pt[0]:.1f}" cy="{pt[1]:.1f}" r="4" class="data-dot" />'

          svg += '</svg>'

          with open("./activity-graph.svg", "w", encoding="utf-8") as f:
              f.write(svg)

      # 🚀 STEP 5: Consolidate, Commit and Push
      - name: Commit and Push changes
        env:
          MY_EMAIL: ${{ secrets.USER_EMAIL }}
          MY_NAME: ${{ secrets.USER_NAME }}
        run: |
          git config --local user.email "$MY_EMAIL"
          git config --local user.name "$MY_NAME"
          
          git add github-stats.svg top-langs.svg github-streak.svg activity-graph.svg
          git diff-index --quiet HEAD || git commit -m "chore: compile clean production assets natively"
          git push
