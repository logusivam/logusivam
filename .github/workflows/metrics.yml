name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"        # once a day at 00:00 UTC
  workflow_dispatch:           # lets you run it manually from the Actions tab
  push:
    branches:
      - main                   # <-- change to "master" if that is your default branch

permissions:
  contents: write              # required so the action can commit the generated SVG

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate github-metrics.svg
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6
        with:
          # ----------------------------------------------------------------
          # TOKEN: create a classic Personal Access Token (PAT) with scopes:
          #   read:user, repo, read:org
          # Add it to this repo as a secret named METRICS_TOKEN
          # (Settings -> Secrets and variables -> Actions -> New repository secret)
          # ----------------------------------------------------------------
          token: ${{ secrets.METRICS_TOKEN }}
          user: logusivam
          filename: github-metrics.svg     # committed to repo root, referenced by README
          template: classic
          config_timezone: Asia/Kolkata

          # --- Base panels (replaces github-readme-stats + summary-cards) ---
          base: header, activity, community, repositories, metadata

          # --- Contribution calendar (replaces activity-graph) ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # --- Languages breakdown (replaces top-langs card) ---
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github

          # --- Coding habits / most productive time ---
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # --- Achievements (nice recruiter signal) ---
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0

          # --- Lines of code changed ---
          plugin_lines: yes
